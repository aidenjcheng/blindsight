name: BlindNav
options:
  bundleIdPrefix: com.blindnav
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    ENABLE_BITCODE: "NO"

packages:
  FirebaseAI:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "12.5.0"

targets:
  BlindNav:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: BlindNav
    settings:
      base:
        INFOPLIST_FILE: BlindNav/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: BlindNav/Resources/BlindNav.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.blindnav.app
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: FirebaseAI
        product: FirebaseAI
    entitlements:
      path: BlindNav/Resources/BlindNav.entitlements
